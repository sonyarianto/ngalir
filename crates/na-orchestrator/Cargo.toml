[package]
name = "na-orchestrator"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Ngalir Orchestrator: validates and executes a Flow Spec DAG of `na-*` nodes."

[[bin]]
name = "ngalir"
path = "src/main.rs"

[dependencies]
na-contract = { path = "../na-contract" }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
jsonschema = "0.46.10"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["json"] }
clap = { version = "4.6.1", features = ["derive"] }

[dev-dependencies]
na-echo = { path = "../na-echo" }
tempfile = "3.27.0"
