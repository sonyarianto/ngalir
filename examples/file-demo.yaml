version: 1
name: file-demo
description: "Write a file, then read it back — writer must finish before reader"
nodes:
  - id: writer
    use: file
    with:
      action: write
      path: /tmp/ngalir-demo.txt
      content: "hello from Ngalir"
  - id: reader
    use: file
    with:
      action: read
      path: /tmp/ngalir-demo.txt
    when: "{{ writer.bytes >= 0 }}"
